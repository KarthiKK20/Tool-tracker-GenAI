<!DOCTYPE html>
<html>

<head>

<title>GenAI Trend Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial, Helvetica, sans-serif;
margin:0;
padding:0;
}

.header{
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.dashboard{

display:grid;
grid-template-columns:1fr;
gap:30px;
padding:30px;
max-width:1100px;
margin:auto;

}

.card{

background:#1e293b;
padding:25px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.3);

}

.card h2{
margin-bottom:15px;
}

canvas{
background:white;
border-radius:8px;
padding:10px;
}

</style>

</head>

<body>

<div class="header">
GenAI Trend Analytics Dashboard
</div>

<div class="dashboard">

<div class="card">

<h2>Top Trending Tools</h2>

<canvas id="trendChart" height="120"></canvas>

</div>

<div class="card">

<h2>Platform Comparison</h2>

<canvas id="platformChart" height="120"></canvas>

</div>

<div class="card">

<h2>Weekly Growth Trend</h2>

<canvas id="growthChart" height="120"></canvas>

</div>

</div>

<script>

const toolsData = {{ tools | tojson }};
const scoresData = {{ scores | tojson }};
const githubData = {{ github_scores | tojson }};
const redditData = {{ reddit_scores | tojson }};
const weeklyGrowth = {{ weekly_growth | tojson }};


// Trend Score Chart

new Chart(document.getElementById("trendChart"),{

type:"bar",

data:{
labels:toolsData,
datasets:[{
label:"Trend Score",
data:scoresData
}]
}

});


// Platform Comparison

new Chart(document.getElementById("platformChart"),{

type:"bar",

data:{
labels:toolsData,

datasets:[
{
label:"GitHub",
data:githubData
},
{
label:"Reddit",
data:redditData
}
]

}

});


// Weekly Growth Chart

new Chart(document.getElementById("growthChart"),{

type:"line",

data:{
labels:["Week1","Week2","Week3","Week4","Week5"],

datasets:[{
label:"Trend Growth %",
data:weeklyGrowth
}]
}

});

</script>

</body>

</html>
